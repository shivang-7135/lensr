services:
  - type: web
    name: lensr-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: ohio # us-east-2, close to Bedrock us-east-1
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: BEDROCK_MODEL_REASONING
        value: anthropic.claude-3-5-sonnet-20241022-v2:0
      - key: BEDROCK_MODEL_ROUTER
        value: anthropic.claude-3-haiku-20240307-v1:0
      - key: BEDROCK_MODEL_VISION
        value: anthropic.claude-3-5-sonnet-20241022-v2:0
      - key: SERPER_API_KEY
        sync: false
      - key: BACKEND_SHARED_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGIN
        value: https://lensr.studio
